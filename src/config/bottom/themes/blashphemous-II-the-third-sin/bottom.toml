[styles]
theme = "default"

[styles.cpu]
all_entry_color = "#a0c3bc"
avg_entry_color = "#b8d5ce"
cpu_core_colors = ["#a0c3bc", "#b8d5ce", "#7a9f96", "#5a8a7e", "#3a6a5e", "#2a5a4e", "#171e26", "#1e2632"]

[styles.memory]
ram_color = "#a0c3bc"
swap_color = "#7a9f96"

[styles.network]
rx_color = "#b8d5ce"
tx_color = "#a0c3bc"
rx_total_color = "#7a9f96"
tx_total_color = "#5a8a7e"

[styles.battery]
high_battery_color = "#7a9f96"
