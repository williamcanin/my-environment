# ===================================
#  Hyprlock 0.9+
#  File: ~/.config/hypr/hyprlock.conf
#  By: William C. Canin
#  Theme: blasphemous-II-repose-of-the-silent-one
# ===================================

background {
  monitor =
  path = ~/.cache/hypr/hyprlock-wallpaper-blur.png
  blur_size = 3
  blur_passes = 3
  brightness = 0.55
}

input-field {
  monitor =
  size = 280, 45
  outline_thickness = 1
  outer_color = rgb(90, 138, 138)
  inner_color = rgb(20, 30, 30)
  font_color = rgb(224, 230, 228)
  placeholder_text = <i>  Password</i>
  position = 0, -100
  halign = center
  valign = center
  rounding = 6
}

shape {
  monitor =
  size = 320, 150
  color = rgba(20, 30, 30, 0.72)
  rounding = 12
  position = 0, 83
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgba(224, 230, 228, 0.85)
  font_size = 64
  font_family = JetBrainsMono Nerd Font
  position = 0, 100
  halign = center
  valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%a, %d %B"
    color = rgba(180, 200, 198, 0.80)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}
