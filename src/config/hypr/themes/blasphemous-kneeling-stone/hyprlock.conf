# =============================================
#  Hyprlock 0.9+
#  File original: ~/.config/hypr/hyprlock.conf
#  By: William C. Canin
#  Theme: blasphemous-kneeling-stone
# =============================================

background {
  monitor =
  path = ~/.cache/hypr/hyprlock-wallpaper-blur.png
  blur_size = 3
  blur_passes = 3
  brightness = 0.55
}

input-field {
  monitor =
  size = 240, 48
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgb(cba6f7)
  inner_color = rgb(1e1e2e)
  font_color = rgb(cdd6f4)
  fade_on_empty = false
  placeholder_text = <span foreground="##bac2de">Password...</span>
  hide_input = false
  position = 0, -80
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] date +"%H:%M"
  color = rgb(cdd6f4)
  font_size = 64
  position = 0, 80
  halign = center
  valign = center
}
